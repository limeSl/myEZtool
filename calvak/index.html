<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>캘박</title>
  <style>
    form { width: fit-content; }
    label { display: block; }
    input {
      display: block;
      width: 100%;
      box-sizing: border-box;
      border: none;
      border-bottom: 1px solid #ccc;
      padding: 8px 0;
      font-size: 16px;
      outline: none;
      background: transparent;
    }
    input:focus { border-bottom-color: #333; }
    .row { display: flex; gap: 24px; }
    .row label { flex: 1; }
  </style>
</head>
<body>
  <h2>캘박</h2>
  <form id="form">
    <label>일정명
      <input name="title" required>
    </label>
    <div class="row">
      <label>날짜
        <input name="date" type="date" required>
      </label>
      <label>시작
        <input name="start" type="time">
      </label>
      <label>종료
        <input name="end" type="time">
      </label>
    </div>
    <label>장소 (선택)
      <input name="location">
    </label>
    <p><button type="submit">캘린더에 추가</button></p>
  </form>

  <script>
    const f = document.getElementById('form');

    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    f.date.value = `${yyyy}-${mm}-${dd}`;
    f.title.focus();

    f.start.addEventListener('input', function() {
      if (!this.value) return;
      const [h, m] = this.value.split(':').map(Number);
      const endH = String((h + 1) % 24).padStart(2, '0');
      const endM = String(m).padStart(2, '0');
      f.end.value = `${endH}:${endM}`;
    });

    f.addEventListener('submit', function(e) {
      e.preventDefault();
      const date = f.date.value.replace(/-/g, '');

      let dtStart, dtEnd;
      if (f.start.value) {
        dtStart = `DTSTART:${date}T${f.start.value.replace(':', '')}00`;
        dtEnd   = `DTEND:${date}T${f.end.value.replace(':', '')}00`;
      } else {
        dtStart = `DTSTART;VALUE=DATE:${date}`;
        dtEnd   = `DTEND;VALUE=DATE:${date}`;
      }

      const lines = [
        'BEGIN:VCALENDAR',
        'VERSION:2.0',
        'BEGIN:VEVENT',
        `SUMMARY:${f.title.value}`,
        dtStart,
        dtEnd,
      ];
      if (f.location.value) lines.push(`LOCATION:${f.location.value}`);
      lines.push('END:VEVENT', 'END:VCALENDAR');

      const blob = new Blob([lines.join('\r\n')], { type: 'text/calendar' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${f.title.value}.ics`;
      a.click();
    });
  </script>
</body>
</html>
