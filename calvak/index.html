<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>캘박</title>
  <style>
    form { width: fit-content; }
    label { display: block; }
    input {
      display: block;
      width: 100%;
      box-sizing: border-box;
      border: none;
      border-bottom: 1px solid #ccc;
      padding: 8px 0;
      font-size: 16px;
      outline: none;
      background: transparent;
    }
    input:focus { border-bottom-color: #333; }
    .row { display: flex; gap: 24px; }
    .row label { flex: 1; }
    .time-row { display: flex; align-items: flex-end; gap: 2px; }
    .time-row input { width: 32px; text-align: center; }
    .time-row .sep { padding-bottom: 8px; font-size: 16px; line-height: 1; color: #aaa; }
    #status { margin-top: 8px; font-size: 14px; color: #555; }
  </style>
</head>
<body>
  <h2>캘박</h2>
  <form id="form">
    <label>일정명
      <input name="title" required>
    </label>
    <div class="row">
      <label>날짜
        <input name="date" type="date" required>
      </label>
      <label>시작
        <div class="time-row">
          <input name="startH" placeholder="--" maxlength="2" inputmode="numeric">
          <span class="sep">:</span>
          <input name="startM" placeholder="--" maxlength="2" inputmode="numeric">
        </div>
      </label>
      <label>종료
        <div class="time-row">
          <input name="endH" placeholder="--" maxlength="2" inputmode="numeric">
          <span class="sep">:</span>
          <input name="endM" placeholder="--" maxlength="2" inputmode="numeric">
        </div>
      </label>
    </div>
    <label>장소 (선택)
      <input name="location">
    </label>
    <p><button type="submit">캘린더에 추가</button></p>
    <div id="status"></div>
  </form>

  <script src="https://accounts.google.com/gsi/client"></script>
  <script>
    const CLIENT_ID = '256572036104-45639a7v2cicg5pbfb0ip5qv8ml2ardr.apps.googleusercontent.com';
    const SCOPE = 'https://www.googleapis.com/auth/calendar.events';

    const f = document.getElementById('form');
    const status = document.getElementById('status');

    f.date.value = new Date().toISOString().slice(0, 10);
    f.title.focus();

    // 시 입력 후 자동으로 분으로 포커스
    f.startH.addEventListener('input', function() {
      this.value = this.value.replace(/\D/g, '');
      if (this.value.length === 2 || (this.value.length === 1 && +this.value >= 3)) {
        f.startM.focus();
      }
      fillEndTime();
    });
    f.startM.addEventListener('input', function() {
      this.value = this.value.replace(/\D/g, '');
      if (this.value.length === 2) f.endH.focus();
      fillEndTime();
    });

    f.startM.addEventListener('keydown', function(e) {
      if (e.key === 'Backspace' && !this.value) f.startH.focus();
    });
    f.endM.addEventListener('keydown', function(e) {
      if (e.key === 'Backspace' && !this.value) f.endH.focus();
    });

    f.endH.addEventListener('keydown', function(e) {
      if (e.key === 'Backspace' && !this.value) f.startM.focus();
    });

    f.endH.addEventListener('focus', function() { this.select(); });
    f.endM.addEventListener('focus', function() { this.select(); });

    f.endH.addEventListener('input', function() {
      this.value = this.value.replace(/\D/g, '');
      if (this.value.length === 2 || (this.value.length === 1 && +this.value >= 3)) {
        f.endM.focus();
      }
    });

    function fillEndTime() {
      const h = parseInt(f.startH.value);
      const m = parseInt(f.startM.value) || 0;
      if (isNaN(h)) return;
      f.endH.value = String((h + 1) % 24).padStart(2, '0');
      f.endM.value = String(m).padStart(2, '0');
    }

    let tokenClient;
    let pendingEvent = null;

    window.onload = () => {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPE,
        callback: async (resp) => {
          if (resp.error) { status.textContent = '인증 실패: ' + resp.error; return; }
          await insertEvent(pendingEvent, resp.access_token);
        }
      });
    };

    async function insertEvent(event, token) {
      status.textContent = '추가 중...';
      const res = await fetch(
        'https://www.googleapis.com/calendar/v3/calendars/primary/events',
        {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(event),
        }
      );
      if (res.ok) {
        status.textContent = '추가됐어요!';
        f.reset();
        f.date.value = new Date().toISOString().slice(0, 10);
        f.title.focus();
      } else {
        const err = await res.json();
        status.textContent = '오류: ' + err.error.message;
      }
    }

    f.addEventListener('submit', function(e) {
      e.preventDefault();
      const date = f.date.value;
      const event = { summary: f.title.value };

      const sH = f.startH.value.padStart(2, '0');
      const sM = (f.startM.value || '00').padStart(2, '0');
      const eH = f.endH.value.padStart(2, '0');
      const eM = (f.endM.value || '00').padStart(2, '0');

      if (f.startH.value) {
        event.start = { dateTime: `${date}T${sH}:${sM}:00`, timeZone: 'Asia/Seoul' };
        event.end   = { dateTime: `${date}T${eH}:${eM}:00`, timeZone: 'Asia/Seoul' };
      } else {
        event.start = { date };
        event.end   = { date };
      }
      if (f.location.value) event.location = f.location.value;

      pendingEvent = event;
      tokenClient.requestAccessToken({ prompt: '' });
    });
  </script>
</body>
</html>
