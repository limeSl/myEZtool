<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>[연수]</title>
  <style>
    body { font-family: sans-serif; max-width: 1100px; margin: 60px auto; padding: 0 24px; }
    .header { display: flex; justify-content: space-between; align-items: center; }
    .header h2 { margin: 0; }
    .back { font-size: 13px; color: #aaa; text-decoration: none; }
    .back:hover { color: #333; }
    label { display: block; margin-top: 20px; font-size: 14px; color: #888; }
    input, select, textarea {
      display: block; width: 100%; box-sizing: border-box;
      border: none; border-bottom: 1px solid #ccc;
      padding: 8px 0; font-size: 16px; outline: none;
      background: transparent; font-family: inherit; color: #333;
    }
    input:focus, select:focus, textarea:focus { border-bottom-color: #333; }
    textarea { resize: vertical; border: 1px solid #ccc; padding: 8px; margin-top: 4px; min-height: 60px; }
    textarea:focus { border-color: #333; outline: none; }
    .row { display: flex; gap: 24px; }
    .row label { flex: 1; }
    .hint { font-size: 12px; color: #aaa; margin-top: 2px; }
    .tabs { display: flex; margin: 24px 0; border-bottom: 1px solid #eee; }
    .tab { background: none; border: none; border-bottom: 2px solid transparent; padding: 8px 16px 8px 0; font-size: 15px; color: #aaa; cursor: pointer; margin-bottom: -1px; font-family: inherit; }
    .tab.active { color: #333; border-bottom-color: #333; }
    .msg { color: #aaa; font-size: 14px; margin-top: 12px; }
    #setupStatus, #addStatus { font-size: 14px; color: #555; margin-top: 8px; }
    .disconnect { float: right; font-size: 12px; color: #ccc; background: none; border: none; cursor: pointer; font-family: inherit; margin-top: 4px; }
    .disconnect:hover { color: #999; }

    /* 통계 */
    .stat-line { font-size: 14px; color: #555; margin: 6px 0; }

    /* 연수 목록 테이블 */
    #recordList table { width: 100%; border-collapse: collapse; font-size: 14px; }
    #recordList th { text-align: left; color: #888; font-weight: normal; border-bottom: 1px solid #ccc; padding: 4px 8px; white-space: nowrap; }
    #recordList td { padding: 6px 8px; border-bottom: 1px solid #eee; color: #333; vertical-align: top; word-break: keep-all; }
    #recordList tr[data-idx]:hover { background: #f9f9f9; cursor: pointer; }
    #recordList tr.editing { background: #f9f9f9; cursor: default; }
    #recordList td.col-title { min-width: 160px; }
    #recordList td.col-summary { min-width: 150px; }

    /* Drive 버튼 */
    .material-row { display: flex; align-items: flex-end; gap: 8px; }
    .material-row input { flex: 1; }
    .material-row button { white-space: nowrap; font-family: inherit; cursor: pointer; font-size: 14px; }
  </style>
</head>
<body>
  <div class="header">
    <h2>연수</h2>
    <a href="../" class="back">← EZtool</a>
  </div>

  <!-- 설정 화면 -->
  <div id="setup">
    <p class="msg" style="line-height:1.7">
      GitHub PAT로 연수 기록을 어디서든 불러올 수 있어요.<br>
      <a href="https://github.com/settings/tokens/new?scopes=gist&description=myEZtool-training" target="_blank" style="color:#555">토큰 발급 →</a>
      (classic token, scopes: <code>gist</code>만 체크)
    </p>
    <label>GitHub Personal Access Token
      <input id="patInput" type="password" placeholder="ghp_...">
    </label>
    <p><button id="connectBtn">연결하기</button></p>
    <div id="setupStatus"></div>
  </div>

  <!-- 메인 화면 -->
  <div id="main" hidden>
    <button class="disconnect" id="disconnectBtn">연결 해제</button>

    <div class="tabs">
      <button class="tab active" data-tab="view">목록 &amp; 통계</button>
      <button class="tab" data-tab="add">기록 추가</button>
    </div>

    <!-- 목록 & 통계 탭 -->
    <div id="view">
      <div id="loading" class="msg">불러오는 중...</div>
      <div id="viewContent" hidden>
        <div id="statLines"></div>
        <div id="recordList"></div>
        <p id="emptyMsg" class="msg" hidden>아직 연수 기록이 없어요.</p>
      </div>
    </div>

    <!-- 기록 추가 탭 -->
    <div id="add" hidden>
      <form id="addForm">
        <label>연수명
          <input name="title" required>
        </label>
        <div class="row">
          <label>날짜
            <input name="date" type="date" required>
          </label>
          <label>시간 (선택)
            <input name="time" type="time">
            <div class="hint">없으면 종일</div>
          </label>
        </div>
        <label>장소
          <input name="location">
        </label>
        <div class="row">
          <label>연수종류
            <select name="kind">
              <option value="직무">직무</option>
              <option value="자율">자율</option>
              <option value="특수">특수</option>
            </select>
          </label>
          <label>이수시간
            <input name="hours" type="number" min="0" step="0.5" placeholder="0">
          </label>
        </div>
        <label>요약
          <textarea name="summary"></textarea>
        </label>
        <label>소감 (선택)
          <textarea name="note"></textarea>
        </label>
        <label>자료 (선택)
          <div class="material-row">
            <input name="material" id="materialInput" placeholder="Drive 링크 또는 직접 입력">
            <button type="button" id="driveBtn">Drive 선택</button>
          </div>
        </label>
        <p><button type="submit">기록하기</button></p>
        <div id="addStatus"></div>
      </form>
    </div>
  </div>

  <script src="https://accounts.google.com/gsi/client"></script>
  <script src="https://apis.google.com/js/api.js"></script>
  <script>
    // ── 설정 ─────────────────────────────────────────────────────────
    const GOOGLE_CLIENT_ID = '256572036104-45639a7v2cicg5pbfb0ip5qv8ml2ardr.apps.googleusercontent.com';
    const GOOGLE_API_KEY   = 'AIzaSyCTkOc8moZNxm00caI6fqM7Lkx94Ar_t7A';
    const DRIVE_SCOPE      = 'https://www.googleapis.com/auth/drive.readonly';
    const FILENAME         = '연수기록.md';
    const INIT_CONTENT     =
      '# 연수 기록\n\n' +
      '| 연수명 | 장소 | 일시 | 연수종류 | 이수시간 | 요약 | 소감 | 자료 | 수료증 | 나이스 등록 | 학점/호봉 |\n' +
      '|--------|------|------|--------|--------|------|------|------|--------|------------|---------|';

    // ── 상태 ─────────────────────────────────────────────────────────
    let pat    = localStorage.getItem('gh_pat')  || '';
    let gistId = localStorage.getItem('gh_gist') || '';
    let records = [];
    let currentContent = '';
    let driveTokenClient;
    let driveToken = null;
    let pickerReady = false;
    let pickerTarget = null; // input to fill after picker

    if (pat && gistId) showMain();

    // ── Google 초기화 ─────────────────────────────────────────────────
    window.onload = () => {
      gapi.load('picker', () => { pickerReady = true; });
      driveTokenClient = google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CLIENT_ID,
        scope: DRIVE_SCOPE,
        callback: (resp) => {
          if (resp.error) { alert('Drive 인증 실패: ' + resp.error); return; }
          driveToken = resp.access_token;
          openPicker();
        }
      });
    };

    // ── 탭 전환 ──────────────────────────────────────────────────────
    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const t = btn.dataset.tab;
        document.getElementById('view').hidden = t !== 'view';
        document.getElementById('add').hidden  = t !== 'add';
      });
    });

    // ── GitHub 연결 ───────────────────────────────────────────────────
    document.getElementById('connectBtn').addEventListener('click', async () => {
      const input = document.getElementById('patInput').value.trim();
      if (!input) return;
      const st = document.getElementById('setupStatus');
      st.textContent = '연결 중...';
      try {
        await connect(input);
        showMain();
      } catch (e) {
        st.textContent = '오류: ' + e.message;
      }
    });

    document.getElementById('disconnectBtn').addEventListener('click', () => {
      localStorage.removeItem('gh_pat');
      localStorage.removeItem('gh_gist');
      pat = gistId = '';
      document.getElementById('main').hidden  = true;
      document.getElementById('setup').hidden = false;
      document.getElementById('patInput').value = '';
      document.getElementById('setupStatus').textContent = '';
    });

    async function connect(inputPat) {
      const res = await ghFetch('https://api.github.com/gists', { pat: inputPat });
      if (!res.ok) throw new Error('토큰이 유효하지 않아요 (' + res.status + ')');
      const gists = await res.json();
      const found = gists.find(g => g.files && g.files[FILENAME]);
      if (found) {
        gistId = found.id;
      } else {
        const cr = await ghFetch('https://api.github.com/gists', {
          pat: inputPat, method: 'POST',
          body: { description: '연수 기록 (myEZtool)', public: false,
                  files: { [FILENAME]: { content: INIT_CONTENT + '\n' } } },
        });
        if (!cr.ok) throw new Error('Gist 생성 실패');
        gistId = (await cr.json()).id;
      }
      pat = inputPat;
      localStorage.setItem('gh_pat',  pat);
      localStorage.setItem('gh_gist', gistId);
    }

    function showMain() {
      document.getElementById('setup').hidden = true;
      document.getElementById('main').hidden  = false;
      loadGist();
    }

    // ── Gist 읽기 / 쓰기 ─────────────────────────────────────────────
    async function loadGist() {
      document.getElementById('loading').hidden     = false;
      document.getElementById('viewContent').hidden = true;
      try {
        const res  = await ghFetch(`https://api.github.com/gists/${gistId}`);
        const data = await res.json();
        const file = data.files[FILENAME];
        if (!file) throw new Error('파일을 찾을 수 없어요');
        currentContent = file.truncated
          ? await fetch(file.raw_url).then(r => r.text())
          : file.content;
        records = parseMarkdown(currentContent);
        renderView();
        document.getElementById('loading').hidden     = true;
        document.getElementById('viewContent').hidden = false;
      } catch (e) {
        document.getElementById('loading').textContent = '오류: ' + e.message;
      }
    }

    async function saveGist(newContent) {
      const res = await ghFetch(`https://api.github.com/gists/${gistId}`, {
        method: 'PATCH',
        body: { files: { [FILENAME]: { content: newContent } } },
      });
      if (!res.ok) throw new Error('저장 실패 (' + res.status + ')');
      currentContent = newContent;
    }

    function ghFetch(url, opts = {}) {
      const usePat = opts.pat || pat;
      const init = { method: opts.method || 'GET',
        headers: { Authorization: 'token ' + usePat, Accept: 'application/vnd.github+json' } };
      if (opts.body) {
        init.headers['Content-Type'] = 'application/json';
        init.body = JSON.stringify(opts.body);
      }
      return fetch(url, init);
    }

    // ── 파싱 ─────────────────────────────────────────────────────────
    function parseMarkdown(text) {
      const rows = text.split('\n').filter(l => l.trim().startsWith('|') && !l.includes('---'));
      if (rows.length <= 1) return [];
      return rows.slice(1).map((row, idx) => {
        const c = row.split('|').map(s => s.trim());
        return {
          _idx:     idx,
          title:    c[1]  || '',
          location: c[2]  || '',
          datetime: c[3]  || '',
          kind:     c[4]  || '',
          hours:    parseFloat(c[5]) || 0,
          summary:  c[6]  || '',
          note:     c[7]  || '',
          material: c[8]  || '',
          cert:     c[9]  || '',
          neis:     c[10] || '',
          credit:   c[11] || '',
        };
      }).filter(r => r.title);
    }

    // ── 마크다운 재구성 ───────────────────────────────────────────────
    function buildMarkdown() {
      const header =
        '# 연수 기록\n\n' +
        '| 연수명 | 장소 | 일시 | 연수종류 | 이수시간 | 요약 | 소감 | 자료 | 수료증 | 나이스 등록 | 학점/호봉 |\n' +
        '|--------|------|------|--------|--------|------|------|------|--------|------------|---------|';
      const san = s => String(s).replace(/\|/g, '｜').replace(/\n/g, ' ');
      const rows = records.map(r =>
        `| ${san(r.title)} | ${san(r.location)} | ${r.datetime} | ${r.kind} | ${r.hours}h | ${san(r.summary)} | ${san(r.note)} | ${san(r.material)} | ${r.cert} | ${r.neis} | ${r.credit} |`
      );
      return header + '\n' + rows.join('\n') + '\n';
    }

    // ── 렌더 ─────────────────────────────────────────────────────────
    function renderView() {
      const yr    = String(new Date().getFullYear());
      const total = records.reduce((s, r) => s + r.hours, 0);
      const year  = records.filter(r => r.datetime.startsWith(yr)).reduce((s, r) => s + r.hours, 0);
      const rate  = Math.round(year / 60 * 100);
      const counts = { 직무: 0, 자율: 0, 특수: 0 };
      records.forEach(r => { if (r.kind in counts) counts[r.kind]++; });

      document.getElementById('statLines').innerHTML =
        `<p class="stat-line">전체 <b>${total}h</b> · 올해 <b>${year}h</b> · 달성률 <b>${rate}%</b> (60h 기준)</p>` +
        `<p class="stat-line">직무 ${counts.직무}건 · 자율 ${counts.자율}건 · 특수 ${counts.특수}건</p>`;

      const recent = [...records].reverse().slice(0, 20);
      document.getElementById('emptyMsg').hidden = recent.length > 0;
      document.getElementById('recordList').innerHTML = recent.length === 0 ? '' : `
        <table>
          <thead><tr>
            <th>일시</th><th>연수명</th><th>장소</th><th>종류</th><th>시간</th><th>요약</th><th>자료</th>
          </tr></thead>
          <tbody>${recent.map(r => `
            <tr data-idx="${r._idx}">
              <td>${esc(r.datetime)}</td>
              <td class="col-title">${esc(r.title)}</td>
              <td>${esc(r.location)}</td>
              <td>${esc(r.kind)}</td>
              <td>${r.hours}h</td>
              <td class="col-summary">${esc(r.summary)}</td>
              <td>${parseMaterial(r.material)}</td>
            </tr>`).join('')}
          </tbody>
        </table>`;

      document.querySelectorAll('#recordList tr[data-idx]').forEach(el => {
        el.addEventListener('click', e => {
          if (e.target.tagName === 'A') return;
          if (document.querySelector('tr.editing')) return;
          openEdit(parseInt(el.dataset.idx), el);
        });
      });
    }

    function parseMaterial(raw) {
      if (!raw) return '';
      const mdLink = raw.match(/\[([^\]]+)\]\(([^)]+)\)/);
      if (mdLink) return `<a href="${ea(mdLink[2])}" target="_blank">${esc(mdLink[1])}</a>`;
      if (raw.startsWith('http')) return `<a href="${ea(raw)}" target="_blank">자료 열기</a>`;
      return esc(raw);
    }

    // ── 인라인 편집 ───────────────────────────────────────────────────
    function openEdit(idx, el) {
      el.classList.add('editing');
      const r = records[idx];
      const dtParts = r.datetime.split(' ');
      const dateVal = dtParts[0] || '';
      const timeVal = dtParts[1] || '';
      const editRow = document.createElement('tr');
      editRow.className = 'edit-row';
      editRow.innerHTML = `<td colspan="7" style="padding:16px 8px;background:#fff">
        <div style="font-size:13px;color:#888;margin-bottom:2px">연수명</div>
        <input class="ed" data-f="title" value="${ea(r.title)}">
        <div style="display:flex;gap:24px;margin-top:12px">
          <div style="flex:1">
            <div style="font-size:13px;color:#888">날짜</div>
            <input class="ed" data-f="date" type="date" value="${dateVal}">
          </div>
          <div style="flex:1">
            <div style="font-size:13px;color:#888">시간</div>
            <input class="ed" data-f="time" type="time" value="${timeVal}">
          </div>
        </div>
        <div style="margin-top:12px">
          <div style="font-size:13px;color:#888">장소</div>
          <input class="ed" data-f="location" value="${ea(r.location)}">
        </div>
        <div style="display:flex;gap:24px;margin-top:12px">
          <div style="flex:1">
            <div style="font-size:13px;color:#888">연수종류</div>
            <select class="ed" data-f="kind">
              ${['직무','자율','특수'].map(k => `<option${r.kind===k?' selected':''}>${k}</option>`).join('')}
            </select>
          </div>
          <div style="flex:1">
            <div style="font-size:13px;color:#888">이수시간</div>
            <input class="ed" data-f="hours" type="number" min="0" step="0.5" value="${r.hours}">
          </div>
        </div>
        <div style="margin-top:12px">
          <div style="font-size:13px;color:#888">요약</div>
          <textarea class="ed" data-f="summary">${esc(r.summary)}</textarea>
        </div>
        <div style="margin-top:12px">
          <div style="font-size:13px;color:#888">소감</div>
          <textarea class="ed" data-f="note">${esc(r.note)}</textarea>
        </div>
        <div style="margin-top:12px">
          <div style="font-size:13px;color:#888">자료</div>
          <div style="display:flex;gap:8px;align-items:flex-end">
            <input class="ed" data-f="material" value="${ea(r.material)}" style="flex:1">
            <button type="button" class="ed-drive" style="white-space:nowrap;font-family:inherit;cursor:pointer;font-size:14px">Drive</button>
          </div>
        </div>
        <p style="margin-top:16px">
          <button type="button" class="ed-save">저장</button>
          <button type="button" class="ed-cancel" style="margin-left:12px;color:#aaa;background:none;border:none;cursor:pointer;font-family:inherit;font-size:16px">취소</button>
        </p>
        <div class="ed-status" style="font-size:13px;color:#888;margin-top:4px"></div>
      </td>`;
      el.insertAdjacentElement('afterend', editRow);
      editRow.querySelector('.ed-drive').addEventListener('click', () => {
        pickerTarget = editRow.querySelector('[data-f="material"]');
        driveTokenClient.requestAccessToken({ prompt: '' });
      });
      editRow.querySelector('.ed-save').addEventListener('click', () => saveEdit(idx, el));
      editRow.querySelector('.ed-cancel').addEventListener('click', () => renderView());
    }

    async function saveEdit(idx, el) {
      const r = records[idx];
      const form = el.nextElementSibling;
      const dateVal = form.querySelector('[data-f="date"]').value;
      const timeVal = form.querySelector('[data-f="time"]').value;
      r.datetime = timeVal ? `${dateVal} ${timeVal}` : dateVal;
      r.title    = form.querySelector('[data-f="title"]').value;
      r.location = form.querySelector('[data-f="location"]').value;
      r.kind     = form.querySelector('[data-f="kind"]').value;
      r.hours    = parseFloat(form.querySelector('[data-f="hours"]').value) || 0;
      r.summary  = form.querySelector('[data-f="summary"]').value;
      r.note     = form.querySelector('[data-f="note"]').value;
      r.material = form.querySelector('[data-f="material"]').value;

      const st = form.querySelector('.ed-status');
      st.textContent = '저장 중...';
      try {
        await saveGist(buildMarkdown());
        records = parseMarkdown(currentContent);
        renderView();
      } catch (err) {
        st.textContent = '오류: ' + err.message;
      }
    }

    // ── Google Drive Picker ───────────────────────────────────────────
    document.getElementById('driveBtn').addEventListener('click', () => {
      pickerTarget = null;
      driveTokenClient.requestAccessToken({ prompt: '' });
    });

    function openPicker() {
      if (!pickerReady) { alert('Picker API 로딩 중이에요. 잠시 후 다시 시도해 주세요.'); return; }
      new google.picker.PickerBuilder()
        .setOAuthToken(driveToken)
        .setDeveloperKey(GOOGLE_API_KEY)
        .addView(new google.picker.DocsView().setIncludeFolders(true))
        .setCallback(pickerCallback)
        .build()
        .setVisible(true);
    }

    function pickerCallback(data) {
      if (data[google.picker.Response.ACTION] === google.picker.Action.PICKED) {
        const doc  = data[google.picker.Response.DOCUMENTS][0];
        const name = doc[google.picker.Document.NAME];
        const url  = doc[google.picker.Document.URL];
        const val  = `[${name}](${url})`;
        const target = pickerTarget || document.getElementById('materialInput');
        target.value = val;
        pickerTarget = null;
      }
    }

    // ── 기록 추가 ─────────────────────────────────────────────────────
    const addForm = document.getElementById('addForm');
    addForm.date.value = new Date().toISOString().slice(0, 10);

    addForm.addEventListener('submit', async e => {
      e.preventDefault();
      const f = addForm, st = document.getElementById('addStatus');
      st.textContent = '저장 중...';
      const datetime = f.time.value ? `${f.date.value} ${f.time.value}` : f.date.value;
      const san = s => s.replace(/\|/g, '｜').replace(/\n/g, ' ');
      const cells = [
        san(f.title.value), san(f.location.value), datetime, f.kind.value,
        (parseFloat(f.hours.value) || 0) + 'h',
        san(f.summary.value), san(f.note.value), san(f.material.value),
        '[ ]', '[ ]', '[ ]',
      ];
      const newContent = currentContent.trimEnd() + '\n| ' + cells.join(' | ') + ' |\n';
      try {
        await saveGist(newContent);
        records = parseMarkdown(currentContent);
        renderView();
        f.reset();
        f.date.value = new Date().toISOString().slice(0, 10);
        st.textContent = '';
        document.querySelector('.tab[data-tab="view"]').click();
      } catch (err) {
        st.textContent = '오류: ' + err.message;
      }
    });

    function esc(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
